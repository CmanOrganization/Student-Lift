<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Lift - Login</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="text-center" style="margin-bottom: 1.5rem;">
                <div class="logo-icon" style="margin: 0 auto 1rem; font-size: 1.5rem;">🚗</div>
                <h1 class="auth-title">Student Lift</h1>
                <p class="auth-subtitle">Ride-sharing for university students</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login-tab" class="tab-content active">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input 
                            type="email" 
                            id="login-email" 
                            name="email" 
                            placeholder="your.email@student.ac.za"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input 
                            type="password" 
                            id="login-password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="remember" style="width: auto; margin-right: 0.5rem;">
                            Remember me
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Login
                    </button>

                    <div class="auth-link">
                        <a href="#forgot-password">Forgot password?</a>
                    </div>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-tab" class="tab-content">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="reg-fullname">Full Name</label>
                        <input 
                            type="text" 
                            id="reg-fullname" 
                            name="fullname" 
                            placeholder="John Doe"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Email Address</label>
                        <input 
                            type="email" 
                            id="reg-email" 
                            name="email" 
                            placeholder="your.email@student.ac.za"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="reg-phone">Phone Number</label>
                        <input 
                            type="tel" 
                            id="reg-phone" 
                            name="phone" 
                            placeholder="+27 123 456 7890"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="reg-university">University Campus</label>
                        <select id="reg-university" name="university" required>
                            <option value="">Select your campus</option>
                            <option value="stellenbosch">Stellenbosch</option>
                            <option value="pretoria">Pretoria</option>
                            <option value="kempton-park">Kempton Park</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input 
                            type="password" 
                            id="reg-password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="reg-confirm-password">Confirm Password</label>
                        <input 
                            type="password" 
                            id="reg-confirm-password" 
                            name="confirm_password" 
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="terms" required style="width: auto; margin-right: 0.5rem;">
                            I agree to the Terms of Service
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
